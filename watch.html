<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch — Anime Verse</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <button class="icon-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <a href="index.html" class="logo">ANIME <span>VERSE</span></a>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="main" id="watchMain">
    <div class="empty-state" style="min-height:60vh">
      <i class="fas fa-circle-notch fa-spin" style="font-size:40px;color:var(--accent)"></i>
      <h2 style="margin-top:16px">Loading...</h2>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="data.js"></script>
  <script>
    // ===== THEME =====
    function toggleTheme() {
      const html   = document.documentElement;
      const btn    = document.getElementById('themeBtn');
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      localStorage.setItem('av_theme', isDark ? 'light' : 'dark');
    }
    function loadTheme() {
      const saved = localStorage.getItem('av_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerHTML = saved === 'dark'
        ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }

    // ===== CONFIGS =====
    const langFlags = {
      'Japanese': '🇯🇵', 'English Dub': '🇺🇸',
      'Hindi Dub': '🇮🇳', 'Korean': '🇰🇷',
      'Chinese': '🇨🇳', 'Portuguese': '🇧🇷',
      'Spanish': '🇪🇸', 'French': '🇫🇷',
    };
    const qualityConfig = {
      '480p':  { label: '480p SD',   color: '#666' },
      '720p':  { label: '720p HD',   color: '#2a6dd9' },
      '1080p': { label: '1080p FHD', color: '#27ae60' },
      '4k':    { label: '4K UHD',    color: '#C87740' },
    };
    const qualityOrder = ['4k', '1080p', '720p', '480p'];

    // ===== CHECK CONTENT AVAILABILITY =====
    function hasVideoContent(episode) {
      // Check languages object
      const langs = episode.languages || {};
      const hasLangs = Object.values(langs).some(qualMap =>
        qualMap && Object.values(qualMap).some(url => url && url.trim())
      );
      if (hasLangs) return true;
      // Legacy
      if (episode.videoUrls && Object.values(episode.videoUrls).some(u => u && u.trim()))
        return true;
      if (episode.videoUrl && episode.videoUrl.trim()) return true;
      return false;
    }

    function getTelegramData(episode, season) {
      // Episode-level takes priority
      if (episode.telegramLinks && Object.keys(episode.telegramLinks).length > 0) {
        return {
          source: 'episode',
          links: episode.telegramLinks,
          range: null
        };
      }
      if (episode.telegramUrl) {
        return {
          source: 'episode',
          single: episode.telegramUrl,
          range: null
        };
      }
      // Season-level
      if (season.telegramLinks && Object.keys(season.telegramLinks).length > 0) {
        return {
          source: 'season',
          links: season.telegramLinks,
          range: season.episodeRange || null
        };
      }
      if (season.telegramUrl) {
        return {
          source: 'season',
          single: season.telegramUrl,
          range: season.episodeRange || null
        };
      }
      return null;
    }

    // ===== BUILD TELEGRAM SECTION HTML =====
    function buildTelegramHTML(tgData, episode) {
      if (!tgData) return '';

      const rangeText = tgData.range
        ? `Episodes ${tgData.range}`
        : tgData.source === 'season' ? 'Full Season' : null;

      let buttonsHTML = '';

      if (tgData.single) {
        // Single button
        buttonsHTML = `
          <a href="${tgData.single}" target="_blank" rel="noopener"
            class="tg-btn-main">
            <i class="fab fa-telegram"></i>
            ${rangeText ? `Watch ${rangeText}` : 'Open in Telegram'}
          </a>`;
      } else if (tgData.links) {
        // Quality-wise buttons
        const keys = qualityOrder.filter(q => tgData.links[q]);
        if (keys.length === 0) return '';
        buttonsHTML = `
          <div class="tg-quality-row">
            ${keys.map(q => {
              const cfg = qualityConfig[q] || { label: q, color: '#2ca5e0' };
              const label = rangeText
                ? `${cfg.label} — ${rangeText}`
                : cfg.label;
              return `
                <a href="${tgData.links[q]}" target="_blank" rel="noopener"
                  class="tg-quality-btn"
                  style="--tgcolor:${cfg.color}">
                  <i class="fab fa-telegram" style="font-size:12px"></i>
                  ${label}
                </a>`;
            }).join('')}
          </div>`;
      }

      if (!buttonsHTML) return '';

      return `
        <div class="tg-section">
          <div class="tg-label">
            <i class="fab fa-telegram"></i>
            <span>Watch on Telegram</span>
            ${tgData.source === 'season' ? `
            <span style="font-size:11px;color:var(--text2);font-weight:400;
              background:var(--bg3);padding:2px 8px;border-radius:10px;
              border:1px solid var(--border)">Season Pack</span>` : ''}
          </div>
          ${buttonsHTML}
        </div>`;
    }

    // ===== THUMBNAIL ONLY VIEW (no video, only telegram) =====
    function buildThumbnailPlayerHTML(episode, tgHTML) {
      const thumb = episode.thumbnail || '';
      return `
        <div class="tg-only-player">
          ${thumb ? `
          <div class="tg-only-thumb"
            style="background-image:url('${thumb}')">
            <div class="tg-only-overlay">
              <i class="fab fa-telegram"
                style="font-size:48px;color:#2ca5e0;opacity:0.9"></i>
              <div style="color:#fff;font-size:14px;font-weight:600;
                margin-top:10px;text-shadow:0 2px 8px rgba(0,0,0,0.8)">
                Watch on Telegram
              </div>
            </div>
          </div>` : `
          <div class="tg-only-thumb tg-only-thumb-empty">
            <i class="fab fa-telegram"
              style="font-size:56px;color:#2ca5e0"></i>
            <div style="color:#aaa;font-size:14px;margin-top:12px">
              Available on Telegram
            </div>
          </div>`}
        </div>
        ${tgHTML}`;
    }

    // ===== EMBED URL =====
    function getEmbedUrl(url) {
      if (!url || !url.trim()) return null;
      if (url.includes('youtube.com/watch')) {
        try {
          const id = new URL(url).searchParams.get('v');
          return { type: 'iframe', src: `https://www.youtube.com/embed/${id}?autoplay=1&rel=0` };
        } catch {}
      }
      if (url.includes('youtu.be/')) {
        const id = url.split('youtu.be/')[1].split('?')[0];
        return { type: 'iframe', src: `https://www.youtube.com/embed/${id}?autoplay=1&rel=0` };
      }
      if (url.includes('drive.google.com')) {
        const m1 = url.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
        if (m1) return { type: 'iframe', src: `https://drive.google.com/file/d/${m1[1]}/preview` };
        const m2 = url.match(/id=([a-zA-Z0-9_-]{10,})/);
        if (m2) return { type: 'iframe', src: `https://drive.google.com/file/d/${m2[1]}/preview` };
      }
      if (url.match(/\.(mp4|webm|ogg|mkv)(\?|$)/i))
        return { type: 'video', src: url };
      return { type: 'iframe', src: url };
    }

    function getEpisodeLangs(episode) {
      if (episode.languages && Object.keys(episode.languages).length > 0)
        return episode.languages;
      if (episode.videoUrls) return { 'Japanese': episode.videoUrls };
      if (episode.videoUrl)  return { 'Japanese': { '720p': episode.videoUrl } };
      return {};
    }

    function getBestQuality(langData) {
      for (const q of qualityOrder) {
        if (langData[q] && langData[q].trim()) return q;
      }
      return Object.keys(langData)[0] || '';
    }

    // ===== LOAD VIDEO =====
    function loadVideo(url, quality) {
      const embed     = getEmbedUrl(url);
      const container = document.getElementById('playerContainer');
      document.querySelectorAll('.quality-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.quality === quality);
      });
      if (!embed) {
        container.innerHTML = `
          <div class="no-video-msg">
            <i class="fas fa-film"></i>
            <span>Video not available for this quality.</span>
          </div>`;
        return;
      }
      if (embed.type === 'iframe') {
        container.innerHTML = `
          <iframe src="${embed.src}" allowfullscreen
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture">
          </iframe>`;
      } else {
        container.innerHTML = `
          <video controls autoplay controlsList="nodownload">
            <source src="${embed.src}"/>
          </video>`;
      }
    }

    // ===== SWITCH LANGUAGE =====
    function switchLanguage(lang, langData) {
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      const qContainer = document.getElementById('qualityBtnsContainer');
      const available  = qualityOrder.filter(q => langData[q] && langData[q].trim());
      qContainer.innerHTML = available.map(q => {
        const cfg = qualityConfig[q] || { label: q, color: '#888' };
        return `<button class="quality-btn" data-quality="${q}"
          onclick="loadVideo('${langData[q].replace(/'/g,"\\'")}', '${q}')"
          style="--qcolor:${cfg.color}">
          ${cfg.label}
        </button>`;
      }).join('');
      const best = getBestQuality(langData);
      if (best && langData[best]) {
        setTimeout(() => {
          loadVideo(langData[best], best);
          document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.quality === best);
          });
        }, 50);
      }
    }

    // ===== MAIN RENDER =====
    function renderPlayer(anime, season, episode, allEpisodes, seasonId, animeId) {
      const hasVideo  = hasVideoContent(episode);
      const tgData    = getTelegramData(episode, season);
      const hasTg     = !!tgData;
      const tgHTML    = buildTelegramHTML(tgData, episode);

      const languages    = getEpisodeLangs(episode);
      const langKeys     = Object.keys(languages);
      const defaultLang  = langKeys.includes('Japanese') ? 'Japanese' : langKeys[0] || '';
      const initLangData = defaultLang ? languages[defaultLang] : {};
      const initBest     = getBestQuality(initLangData);
      const initQualities= qualityOrder.filter(q => initLangData[q] && initLangData[q].trim());

      // Language buttons
      const langBtnsHTML = langKeys.map(lang => {
        const flag     = langFlags[lang] || '🌐';
        const safeData = JSON.stringify(languages[lang]).replace(/"/g,'&quot;');
        return `<button class="lang-btn ${lang===defaultLang?'active':''}"
          data-lang="${lang}"
          onclick="switchLanguage('${lang}', ${safeData})">
          ${flag} ${lang}
        </button>`;
      }).join('');

      // Quality buttons
      const qualityBtnsHTML = initQualities.map(q => {
        const cfg = qualityConfig[q] || { label: q, color: '#888' };
        return `<button class="quality-btn ${q===initBest?'active':''}" data-quality="${q}"
          onclick="loadVideo('${(initLangData[q]||'').replace(/'/g,"\\'")}', '${q}')"
          style="--qcolor:${cfg.color}">
          ${cfg.label}
        </button>`;
      }).join('');

      // Prev / Next
      const currIdx = allEpisodes.findIndex(e => e.id === episode.id);
      const prevEp  = currIdx > 0 ? allEpisodes[currIdx - 1] : null;
      const nextEp  = currIdx < allEpisodes.length - 1 ? allEpisodes[currIdx + 1] : null;

      const prevBtn = prevEp
        ? `<a href="watch.html?id=${animeId}&season=${seasonId}&ep=${prevEp.id}"
              class="btn-outline" style="font-size:13px;text-decoration:none">
            <i class="fas fa-backward-step"></i> Prev
           </a>`
        : `<button class="btn-outline" disabled style="opacity:0.4;font-size:13px;cursor:not-allowed">
            <i class="fas fa-backward-step"></i> Prev
           </button>`;

      const nextBtn = nextEp
        ? `<a href="watch.html?id=${animeId}&season=${seasonId}&ep=${nextEp.id}"
              class="btn-primary" style="font-size:13px;text-decoration:none">
            Next <i class="fas fa-forward-step"></i>
           </a>`
        : `<button class="btn-primary" disabled style="opacity:0.4;font-size:13px;cursor:not-allowed">
            Next <i class="fas fa-forward-step"></i>
           </button>`;

      // ============================================================
      // SMART DISPLAY LOGIC
      // Video only → Player
      // TG only → Thumbnail + TG buttons
      // Both → Player + TG section below
      // Neither → No content message
      // ============================================================

      let topSectionHTML = '';

      if (hasVideo) {
        // Show video player
        topSectionHTML = `
          <!-- VIDEO PLAYER -->
          <div class="player-wrapper">
            <div id="playerContainer" style="width:100%;height:100%">
              <div class="no-video-msg">
                <i class="fas fa-circle-notch fa-spin" style="font-size:28px"></i>
                <span>Loading video...</span>
              </div>
            </div>
          </div>

          <!-- LANGUAGE + QUALITY -->
          ${langKeys.length > 0 ? `
          <div class="lang-quality-box">
            ${langKeys.length > 0 ? `
            <div class="lq-row">
              <span class="lq-label"><i class="fas fa-language"></i> Language</span>
              <div class="lang-btns">${langBtnsHTML}</div>
            </div>` : ''}
            <div class="lq-row">
              <span class="lq-label"><i class="fas fa-sliders"></i> Quality</span>
              <div class="quality-btns" id="qualityBtnsContainer">
                ${qualityBtnsHTML}
              </div>
            </div>
          </div>` : ''}

          <!-- TELEGRAM (if also has TG) -->
          ${hasTg ? tgHTML : ''}`;

      } else if (hasTg) {
        // Show thumbnail + TG buttons ONLY (no player)
        topSectionHTML = buildThumbnailPlayerHTML(episode, tgHTML);
      } else {
        // Nothing
        topSectionHTML = `
          <div style="background:var(--card-bg);border:1px solid var(--border);
            border-radius:12px;padding:30px 20px;text-align:center;color:var(--text2);
            margin-bottom:14px">
            <i class="fas fa-film" style="font-size:36px;opacity:0.3;margin-bottom:12px;display:block"></i>
            Video not available yet.
          </div>`;
      }

      document.getElementById('watchMain').innerHTML = `
        ${topSectionHTML}

        <!-- NAV -->
        <div class="ep-nav">
          ${prevBtn}
          <a href="anime.html?id=${animeId}" class="btn-outline"
            style="font-size:13px;text-decoration:none">
            <i class="fas fa-list"></i> Episodes
          </a>
          ${nextBtn}
        </div>

        <!-- EPISODE INFO -->
        <div class="watch-info">
          <div class="anime-ep-label">
            ${anime.title} &middot; ${season.title} &middot; Episode ${episode.id}
          </div>
          <h2>${episode.title}</h2>
          <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;align-items:center">
            <span class="info-chip" style="font-size:12px;color:var(--text2)">
              <i class="fas fa-clock" style="color:var(--accent)"></i>
              ${episode.duration || 'N/A'}
            </span>
            ${langKeys.length > 0 ? `
            <span class="info-chip" style="font-size:12px;color:var(--text2)">
              <i class="fas fa-language" style="color:var(--accent)"></i>
              ${langKeys.length} language${langKeys.length > 1 ? 's' : ''}
            </span>` : ''}
            ${hasTg ? `
            <span style="font-size:11px;font-weight:600;color:#2ca5e0;
              display:flex;align-items:center;gap:4px">
              <i class="fab fa-telegram"></i>
              ${tgData.source === 'season' ? 'Season Pack' : 'On Telegram'}
            </span>` : ''}
          </div>
          ${episode.description
            ? `<p style="font-size:13px;color:var(--text2);line-height:1.7;margin-top:10px">
                ${episode.description}</p>` : ''}
        </div>

        <!-- ALL EPISODES -->
        <div style="margin-top:24px">
          <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--text)">
            ${season.title} — All Episodes
          </h3>
          <div class="episodes-list" id="otherEps"></div>
        </div>
      `;

      // Auto-load video if has video
      if (hasVideo && defaultLang && initBest && initLangData[initBest]) {
        setTimeout(() => loadVideo(initLangData[initBest], initBest), 100);
      }

      // Render other episodes
      const otherEps = document.getElementById('otherEps');
      allEpisodes.forEach(ep => {
        const isActive    = ep.id === episode.id;
        const epHasVideo  = hasVideoContent(ep);
        const epTgData    = getTelegramData(ep, season);
        const epHasTg     = !!epTgData;
        const epLangs     = getEpisodeLangs(ep);
        const epLangCount = Object.keys(epLangs).length;

        const item = document.createElement('div');
        item.className = 'episode-item';
        if (isActive) {
          item.style.borderColor = 'var(--accent)';
          item.style.background  = 'var(--bg3)';
        }
        item.innerHTML = `
          <div class="ep-thumb" style="position:relative;overflow:hidden">
            <img src="${ep.thumbnail||''}" alt="Ep ${ep.id}"
              style="width:100%;height:100%;object-fit:cover;border-radius:8px;
                background:var(--bg3)"
              onerror="this.style.background='var(--bg3)'"/>
            <div class="ep-play-icon"
              style="${isActive ? 'opacity:1;background:rgba(200,119,64,0.75)' : ''}">
              <i class="fas fa-${isActive ? 'pause' : 'play'}"></i>
            </div>
            ${epHasTg && !epHasVideo ? `
            <div style="position:absolute;bottom:4px;right:4px;
              background:#2ca5e0;border-radius:4px;padding:2px 6px;
              font-size:9px;color:#fff;font-weight:700">
              <i class="fab fa-telegram"></i>
            </div>` : ''}
          </div>
          <div class="ep-info">
            <div class="ep-num" style="${isActive ? 'color:var(--accent)' : ''}">
              Ep ${ep.id} ${isActive ? '&#9654; Playing' : ''}
            </div>
            <div class="ep-title">${ep.title}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;
              margin-top:3px;align-items:center">
              <span class="ep-duration">
                <i class="fas fa-clock" style="font-size:9px"></i>
                ${ep.duration || ''}
              </span>
              ${epHasVideo && epLangCount > 0 ? `
              <span style="font-size:10px;color:var(--accent);font-weight:600">
                <i class="fas fa-play-circle"></i>
                ${epLangCount} lang${epLangCount > 1 ? 's' : ''}
              </span>` : ''}
              ${epHasTg ? `
              <span style="font-size:10px;color:#2ca5e0;font-weight:600">
                <i class="fab fa-telegram"></i>
                ${epTgData.source === 'season' ? 'Season' : 'TG'}
              </span>` : ''}
              ${!epHasVideo && !epHasTg ? `
              <span style="font-size:10px;color:#888">No video</span>` : ''}
            </div>
          </div>
        `;

        if (!isActive && (epHasVideo || epHasTg)) {
          item.style.cursor = 'pointer';
          item.addEventListener('click', () => {
            window.location.href =
              `watch.html?id=${animeId}&season=${seasonId}&ep=${ep.id}`;
          });
        }
        otherEps.appendChild(item);
      });
    }

    // ===== INIT =====
    loadTheme();

    const params   = new URLSearchParams(window.location.search);
    const animeId  = params.get('id');
    const seasonId = parseInt(params.get('season'));
    const epId     = parseInt(params.get('ep'));

    db.collection('anime').doc(animeId).get().then(doc => {
      if (!doc.exists) {
        document.getElementById('watchMain').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-circle"></i>
            <h2>Anime not found!</h2>
            <p><a href="index.html" style="color:var(--accent)">Go home</a></p>
          </div>`;
        return;
      }
      const anime   = { ...doc.data(), firestoreId: doc.id };
      const season  = anime.seasons && anime.seasons.find(s => s.id === seasonId);
      const episode = season && season.episodes && season.episodes.find(e => e.id === epId);

      if (!season || !episode) {
        document.getElementById('watchMain').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-film"></i>
            <h2>Episode not found!</h2>
            <p><a href="anime.html?id=${animeId}"
              style="color:var(--accent)">Back to anime</a></p>
          </div>`;
        return;
      }
      document.title = `${episode.title} — Anime Verse`;
      renderPlayer(anime, season, episode, season.episodes, seasonId, animeId);
    });
  </script>
</body>
</html>
