<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime Detail — Anime Verse</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <button class="icon-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <a href="index.html" class="logo">ANIME <span>VERSE</span></a>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="main" id="detailMain">
    <div class="empty-state" style="min-height:60vh">
      <i class="fas fa-circle-notch fa-spin"
        style="font-size:40px;color:var(--accent)"></i>
      <h2 style="margin-top:16px">Loading...</h2>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="data.js"></script>
  <script>
    // ===== THEME =====
    function toggleTheme() {
      const html   = document.documentElement;
      const btn    = document.getElementById('themeBtn');
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      localStorage.setItem('av_theme', isDark ? 'light' : 'dark');
    }
    function loadTheme() {
      const saved = localStorage.getItem('av_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerHTML = saved === 'dark'
        ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }

    // ===== FIREBASE =====
    async function getAnime(id) {
      try {
        const doc = await db.collection('anime').doc(id).get();
        if (doc.exists) return { ...doc.data(), firestoreId: doc.id };
      } catch(e) {}
      return null;
    }

    // ===== WATCHLIST =====
    async function toggleWatchlist(id) {
      const user = auth.currentUser;
      const btn  = document.getElementById('watchlistBtn');
      if (user) {
        const ref  = db.collection('users').doc(user.uid);
        const doc  = await ref.get();
        let list   = doc.exists ? (doc.data().watchlist || []) : [];
        if (list.includes(id)) {
          list = list.filter(x => x !== id);
          btn.classList.remove('saved');
          btn.innerHTML = '<i class="fas fa-heart"></i> Add to List';
        } else {
          list.push(id);
          btn.classList.add('saved');
          btn.innerHTML = '<i class="fas fa-heart"></i> Saved!';
        }
        await ref.update({ watchlist: list });
      } else {
        let list = JSON.parse(localStorage.getItem('av_mylist') || '[]');
        if (list.includes(id)) {
          list = list.filter(x => x !== id);
          btn.classList.remove('saved');
          btn.innerHTML = '<i class="fas fa-heart"></i> Add to List';
        } else {
          list.push(id);
          btn.classList.add('saved');
          btn.innerHTML = '<i class="fas fa-heart"></i> Saved!';
        }
        localStorage.setItem('av_mylist', JSON.stringify(list));
      }
    }

    // ===== QUALITY CONFIG =====
    const qualityOrder = ['4k', '1080p', '720p', '480p'];
    const qualityConfig = {
      '480p':  { label: '480p SD',   color: '#666' },
      '720p':  { label: '720p HD',   color: '#2a6dd9' },
      '1080p': { label: '1080p FHD', color: '#27ae60' },
      '4k':    { label: '4K UHD',    color: '#C87740' },
    };

    // ===== BUILD SEASON TELEGRAM PACK HTML =====
    function buildSeasonTgPackHTML(season, animeId) {
      const hasTgLinks = season.telegramLinks &&
        Object.values(season.telegramLinks).some(v => v && v.trim());
      const hasTgSingle = season.telegramUrl && season.telegramUrl.trim();

      if (!hasTgLinks && !hasTgSingle) return '';

      const epCount  = (season.episodes || []).length;
      const range    = season.episodeRange
        ? `Episodes ${season.episodeRange}`
        : epCount > 0 ? `${epCount} Episodes` : 'Full Season';

      let btnHTML = '';

      if (hasTgSingle) {
        btnHTML = `
          <a href="${season.telegramUrl}" target="_blank" rel="noopener"
            class="season-tg-btn-main">
            <i class="fab fa-telegram"></i>
            Watch ${range} on Telegram
          </a>`;
      } else if (hasTgLinks) {
        const keys = qualityOrder.filter(q =>
          season.telegramLinks[q] && season.telegramLinks[q].trim()
        );
        btnHTML = `
          <div class="season-tg-quality-row">
            ${keys.map(q => {
              const cfg = qualityConfig[q] || { label: q, color: '#2ca5e0' };
              return `
                <a href="${season.telegramLinks[q]}"
                  target="_blank" rel="noopener"
                  class="season-tg-quality-btn"
                  style="--tgcolor:${cfg.color}">
                  <i class="fab fa-telegram"></i>
                  ${cfg.label}
                </a>`;
            }).join('')}
          </div>`;
      }

      return `
        <div class="season-tg-pack">
          <div class="season-tg-pack-header">
            <div class="season-tg-pack-icon">
              <i class="fab fa-telegram"></i>
            </div>
            <div>
              <div class="season-tg-pack-title">
                ${season.title} — Telegram Pack
              </div>
              <div class="season-tg-pack-sub">
                <i class="fas fa-film" style="font-size:10px"></i>
                ${range} available
              </div>
            </div>
          </div>
          ${btnHTML}
        </div>`;
    }

    // ===== HAS VIDEO =====
    function hasVideoContent(episode) {
      const langs = episode.languages || {};
      if (Object.values(langs).some(qMap =>
        qMap && Object.values(qMap).some(u => u && u.trim())
      )) return true;
      if (episode.videoUrls && Object.values(episode.videoUrls).some(u => u && u.trim()))
        return true;
      if (episode.videoUrl && episode.videoUrl.trim()) return true;
      return false;
    }

    // ===== SWITCH SEASON =====
    function switchSeason(animeId, seasonIndex, seasons) {
      document.querySelectorAll('.season-tab').forEach((t, i) => {
        t.classList.toggle('active', i === seasonIndex);
      });
      renderSeasonContent(animeId, seasons[seasonIndex], seasons);
    }

    // ===== RENDER SEASON CONTENT =====
    function renderSeasonContent(animeId, season, allSeasons) {
      const container = document.getElementById('seasonContent');
      const episodes  = season.episodes || [];

      // Telegram pack HTML
      const tgPackHTML = buildSeasonTgPackHTML(season, animeId);

      // Episodes section
      let episodesHTML = '';
      if (episodes.length > 0) {
        episodesHTML = `
          <div class="episodes-section-title">
            <i class="fas fa-play-circle"
              style="color:var(--accent);font-size:15px"></i>
            Watch Episodes
          </div>
          <div class="episodes-list" id="episodesList"></div>`;
      } else if (!tgPackHTML) {
        episodesHTML = `
          <div class="empty-msg" style="padding:30px 0">
            No episodes added yet.
          </div>`;
      }

      container.innerHTML = `
        ${tgPackHTML}
        ${episodesHTML}`;

      // Render individual episodes
      if (episodes.length > 0) {
        const list = document.getElementById('episodesList');
        episodes.forEach(ep => {
          const hasVid = hasVideoContent(ep);
          const hasTg  = !!(ep.telegramLinks || ep.telegramUrl);
          const isClickable = hasVid || hasTg;

          const item = document.createElement('div');
          item.className = 'episode-item';
          if (!isClickable) item.style.opacity = '0.6';
          else item.style.cursor = 'pointer';

          item.innerHTML = `
            <div class="ep-thumb" style="position:relative;overflow:hidden">
              <img src="${ep.thumbnail || ''}" alt="Ep ${ep.id}"
                style="width:100%;height:100%;object-fit:cover;
                  border-radius:8px;background:var(--bg3);display:block"
                onerror="this.style.background='var(--bg3)'"/>
              <div class="ep-play-icon">
                <i class="fas fa-${isClickable ? 'play' : 'lock'}"></i>
              </div>
              ${hasTg && !hasVid ? `
              <div style="position:absolute;bottom:4px;right:4px;
                background:#2ca5e0;border-radius:4px;padding:2px 6px;
                font-size:9px;color:#fff;font-weight:700">
                <i class="fab fa-telegram"></i>
              </div>` : ''}
            </div>
            <div class="ep-info">
              <div class="ep-num">Episode ${ep.id}</div>
              <div class="ep-title">${ep.title}</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;
                margin-top:3px;align-items:center">
                ${ep.duration ? `
                <span class="ep-duration">
                  <i class="fas fa-clock" style="font-size:9px"></i>
                  ${ep.duration}
                </span>` : ''}
                ${hasVid ? `
                <span style="font-size:10px;color:var(--accent);font-weight:600">
                  <i class="fas fa-play-circle"></i> Watch
                </span>` : ''}
                ${hasTg ? `
                <span style="font-size:10px;color:#2ca5e0;font-weight:600">
                  <i class="fab fa-telegram"></i> Telegram
                </span>` : ''}
                ${!hasVid && !hasTg ? `
                <span style="font-size:10px;color:#888">
                  <i class="fas fa-clock"></i> Coming soon
                </span>` : ''}
              </div>
            </div>
          `;

          if (isClickable) {
            item.addEventListener('click', () => {
              window.location.href =
                `watch.html?id=${animeId}&season=${season.id}&ep=${ep.id}`;
            });
          }
          list.appendChild(item);
        });
      }
    }

    // ===== RENDER DETAIL =====
    async function renderDetail(anime) {
      const animeId = anime.firestoreId;
      const user    = auth.currentUser;
      let isSaved   = false;

      if (user) {
        const doc = await db.collection('users').doc(user.uid).get();
        const wl  = doc.exists ? (doc.data().watchlist || []) : [];
        isSaved   = wl.includes(animeId);
      } else {
        const local = JSON.parse(localStorage.getItem('av_mylist') || '[]');
        isSaved = local.includes(animeId);
      }

      const seasons = anime.seasons || [];

      // Find first watchable episode for "Watch Now"
      let watchUrl = '#';
      for (const season of seasons) {
        const eps = season.episodes || [];
        for (const ep of eps) {
          if (hasVideoContent(ep) || ep.telegramLinks || ep.telegramUrl) {
            watchUrl = `watch.html?id=${animeId}&season=${season.id}&ep=${ep.id}`;
            break;
          }
        }
        if (watchUrl !== '#') break;
        // If season has TG but no episodes, point to first ep if exists
        if ((season.telegramLinks || season.telegramUrl) && eps.length > 0) {
          watchUrl = `watch.html?id=${animeId}&season=${season.id}&ep=${eps[0].id}`;
          break;
        }
      }

      const genres    = (anime.genre || []).map(g =>
        `<span class="genre-tag">${g}</span>`).join('');

      const seasonTabs = seasons.map((s, i) => `
        <button class="season-tab ${i === 0 ? 'active' : ''}"
          onclick="switchSeason('${animeId}', ${i}, currentSeasons)">
          ${s.title}
        </button>`).join('');

      document.getElementById('detailMain').innerHTML = `
        <img class="anime-banner"
          src="${anime.banner || anime.thumbnail || ''}"
          alt="${anime.title}"
          onerror="this.style.background='var(--bg3)'"/>

        <div class="anime-detail-card">
          <div class="anime-detail-top">
            <img class="anime-poster"
              src="${anime.thumbnail || ''}"
              alt="${anime.title}"
              onerror="this.style.background='var(--bg3)'"/>
            <div class="anime-info">
              <h1>${anime.title}</h1>
              <p class="subtitle">${anime.studio || ''} · ${anime.year || ''}</p>
              <div class="info-row">
                <span class="info-chip rating">
                  <i class="fas fa-star"></i> ${anime.rating || 'N/A'}
                </span>
                <span class="info-chip">
                  <i class="fas fa-circle-dot"></i> ${anime.status || ''}
                </span>
                <span class="info-chip">
                  <i class="fas fa-layer-group"></i>
                  ${seasons.length} Season${seasons.length !== 1 ? 's' : ''}
                </span>
              </div>
              <div class="genre-tags">${genres}</div>
            </div>
          </div>

          <p class="anime-desc">${anime.description || ''}</p>

          <div class="action-btns">
            <a href="${watchUrl}" class="btn-primary"
              style="text-decoration:none;${watchUrl === '#' ? 'opacity:0.5;pointer-events:none' : ''}">
              <i class="fas fa-play"></i> Watch Now
            </a>
            <button class="btn-outline ${isSaved ? 'saved' : ''}"
              id="watchlistBtn"
              onclick="toggleWatchlist('${animeId}')">
              <i class="fas fa-heart"></i>
              ${isSaved ? 'Saved!' : 'Add to List'}
            </button>
          </div>
        </div>

        <!-- SEASON TABS -->
        <div class="seasons-tabs" id="seasonsTabs">
          ${seasonTabs}
        </div>

        <!-- SEASON CONTENT (TG Pack + Episodes) -->
        <div id="seasonContent"></div>
      `;

      // Store seasons globally for tab switching
      window.currentSeasons = seasons;

      // Render first season
      if (seasons.length > 0) {
        renderSeasonContent(animeId, seasons[0], seasons);
      } else {
        document.getElementById('seasonContent').innerHTML =
          '<p class="empty-msg" style="padding:30px 0">No seasons added yet.</p>';
      }
    }

    // ===== INIT =====
    loadTheme();

    const params  = new URLSearchParams(window.location.search);
    const animeId = params.get('id');

    getAnime(animeId).then(anime => {
      if (anime) {
        document.title = `${anime.title} — Anime Verse`;
        renderDetail(anime);
      } else {
        document.getElementById('detailMain').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-circle"></i>
            <h2>Anime not found!</h2>
            <p><a href="index.html"
              style="color:var(--accent)">Go back home</a></p>
          </div>`;
      }
    });
  </script>
</body>
</html>
