<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Anime Verse</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .profile-page { max-width:500px; margin:0 auto; padding:16px; }

    /* CENTER PFP — NO BANNER, NO BORDER */
    .profile-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 16px;
      position: relative;
    }
    .profile-avatar-wrap {
      position: relative;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .profile-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg3);
      display: block;
    }
    .profile-avatar-placeholder {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 700;
      color: #fff; font-family: 'Poppins', sans-serif;
    }
    .profile-avatar-edit-btn {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 28px; height: 28px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .profile-avatar-edit-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .profile-display-name {
      font-size: 20px; font-weight: 700;
      color: var(--text); margin-bottom: 2px;
      text-align: center;
    }
    .profile-username-tag {
      font-size: 13px; color: var(--accent);
      font-weight: 600; margin-bottom: 6px;
    }
    .profile-bio-text {
      font-size: 13px; color: var(--text2);
      line-height: 1.6; text-align: center;
      max-width: 300px;
    }
    .profile-email-row {
      font-size: 11px; color: var(--text2);
      margin-top: 6px;
      display: flex; align-items: center; gap: 5px;
      flex-wrap: wrap; justify-content: center;
    }

    /* STATS */
    .profile-stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; margin: 14px 0;
    }
    .profile-stat-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 8px; text-align: center;
    }
    .profile-stat-num {
      font-size: 20px; font-weight: 700;
      color: var(--accent); line-height: 1; margin-bottom: 4px;
    }
    .profile-stat-label { font-size: 11px; color: var(--text2); }

    /* EDIT FORM */
    .profile-edit-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }
    .profile-edit-card h3 {
      font-size: 15px; font-weight: 700;
      color: var(--text); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .username-check { font-size: 11px; margin-top:4px; display:none; }
    .username-check.ok      { color:#27ae60; display:block; }
    .username-check.error   { color:#e50914; display:block; }
    .username-check.checking{ color:var(--text2); display:block; }

    .profile-success {
      background:rgba(39,174,96,0.1); border:1px solid #27ae60;
      color:#27ae60; padding:10px 14px; border-radius:8px;
      font-size:13px; margin-bottom:14px; display:none;
    }
    .profile-error {
      background:rgba(229,9,20,0.1); border:1px solid #e50914;
      color:#e50914; padding:10px 14px; border-radius:8px;
      font-size:13px; margin-bottom:14px; display:none;
    }

    /* WATCHLIST */
    .profile-watchlist-title {
      font-size:15px; font-weight:700; color:var(--text);
      margin:16px 0 12px;
      display:flex; align-items:center; gap:8px;
    }

    /* NOT LOGGED IN */
    .profile-login-prompt {
      text-align:center; padding:60px 20px; color:var(--text2);
    }
    .profile-login-prompt i {
      font-size:64px; color:var(--accent); opacity:0.5; margin-bottom:20px;
    }
    .profile-login-prompt h2 {
      font-size:22px; font-weight:700; color:var(--text); margin-bottom:10px;
    }

    /* AVATAR BOTTOM SHEET */
    .avatar-sheet-overlay {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.6);
      z-index:300; display:flex;
      align-items:flex-end; justify-content:center;
      padding:16px; backdrop-filter:blur(4px);
    }
    .avatar-sheet {
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:16px; padding:20px;
      width:100%; max-width:420px;
    }
    .avatar-sheet h3 {
      font-size:15px; font-weight:700;
      color:var(--text); margin-bottom:16px; text-align:center;
    }
    .avatar-preview-circle {
      width:80px; height:80px; border-radius:50%;
      object-fit:cover; background:var(--bg3);
      margin:0 auto 12px; display:block;
    }
    #adminVideoFileInput, #galleryInput { display:none; }
  </style>
</head>
<body>

  <!-- Hidden gallery input -->
  <input type="file" id="galleryInput" accept="image/*"
    onchange="onImagePicked(this)"/>

  <!-- AVATAR BOTTOM SHEET -->
  <div class="avatar-sheet-overlay hidden" id="avatarSheet">
    <div class="avatar-sheet">
      <h3>Change Profile Picture</h3>

      <!-- Preview area -->
      <div id="avatarPreviewArea" style="display:none;text-align:center;
        margin-bottom:14px">
        <img id="avatarPreviewImg" class="avatar-preview-circle" src="" alt=""/>
        <p style="font-size:12px;color:var(--text2)">
          Preview — tap Save to confirm
        </p>
      </div>

      <!-- Uploading -->
      <div id="avatarUploadingState"
        style="display:none;text-align:center;padding:20px 0">
        <i class="fas fa-circle-notch fa-spin"
          style="font-size:28px;color:var(--accent);
            margin-bottom:10px;display:block"></i>
        <div style="font-size:13px;color:var(--text2)">Saving...</div>
      </div>

      <!-- Main option -->
      <div id="avatarMainOptions">
        <div onclick="document.getElementById('galleryInput').click()"
          style="display:flex;align-items:center;gap:12px;
            padding:14px;border-radius:10px;background:var(--bg3);
            border:1px solid var(--border);cursor:pointer;
            transition:border-color 0.2s;margin-bottom:10px"
          onmouseover="this.style.borderColor='var(--accent)'"
          onmouseout="this.style.borderColor='var(--border)'">
          <div style="width:40px;height:40px;border-radius:10px;
            background:var(--accent);display:flex;align-items:center;
            justify-content:center;color:#fff;font-size:18px;flex-shrink:0">
            <i class="fas fa-image"></i>
          </div>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text)">
              Choose from Gallery
            </div>
            <div style="font-size:12px;color:var(--text2)">
              Select photo from your device
            </div>
          </div>
          <i class="fas fa-chevron-right"
            style="color:var(--text2);margin-left:auto;font-size:12px"></i>
        </div>
      </div>

      <!-- Action buttons (after preview) -->
      <div id="avatarActionRow"
        style="display:none;gap:10px;margin-top:4px">
        <button class="btn-outline"
          onclick="cancelAvatarPick()" style="flex:1">
          Cancel
        </button>
        <button class="btn-primary"
          onclick="confirmSaveAvatar()" style="flex:1">
          <i class="fas fa-floppy-disk"></i> Save
        </button>
      </div>

      <!-- Close button -->
      <div id="avatarCloseRow" style="margin-top:4px">
        <button class="btn-outline"
          onclick="closeAvatarSheet()" style="width:100%">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <a href="index.html" class="logo">ANIME <span>VERSE</span></a>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="profile-page" id="profilePage">
      <div class="empty-state" style="min-height:50vh">
        <i class="fas fa-circle-notch fa-spin"
          style="font-size:40px;color:var(--accent)"></i>
        <h2 style="margin-top:16px">Loading...</h2>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="data.js"></script>
  <script>
    // ===== THEME =====
    function toggleTheme() {
      const html = document.documentElement;
      const btn  = document.getElementById('themeBtn');
      const dark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', dark ? 'light' : 'dark');
      btn.innerHTML = dark
        ? '<i class="fas fa-sun"></i>'
        : '<i class="fas fa-moon"></i>';
      localStorage.setItem('av_theme', dark ? 'light' : 'dark');
    }
    function loadTheme() {
      const saved = localStorage.getItem('av_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerHTML = saved === 'dark'
        ? '<i class="fas fa-moon"></i>'
        : '<i class="fas fa-sun"></i>';
    }

    let currentUserData = {};
    let pendingB64      = null;
    let usernameTimer   = null;

    // ===== ENSURE USER DOC =====
    async function ensureUserDoc(user) {
      const ref = db.collection('users').doc(user.uid);
      const doc = await ref.get();
      if (!doc.exists) {
        await ref.set({
          name:      user.displayName || 'User',
          email:     user.email,
          watchlist: [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      return (await ref.get()).data();
    }

    // ===== COMPRESS IMAGE =====
    function compressImg(file, maxW=300, quality=0.75) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let w=img.width, h=img.height;
            if (w>maxW) { h=(h*maxW)/w; w=maxW; }
            const canvas=document.createElement('canvas');
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            res(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = rej;
          img.src = e.target.result;
        };
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
    }

    // ===== AVATAR SHEET =====
    function openAvatarSheet() {
      pendingB64 = null;
      document.getElementById('avatarSheet').classList.remove('hidden');
      document.getElementById('avatarMainOptions').style.display = 'block';
      document.getElementById('avatarPreviewArea').style.display  = 'none';
      document.getElementById('avatarActionRow').style.display    = 'none';
      document.getElementById('avatarUploadingState').style.display = 'none';
      const ar = document.getElementById('avatarActionRow');
      ar.style.display = 'none';
      ar.style.flexDirection = 'row';
      document.getElementById('avatarCloseRow').style.display = 'block';
    }
    function closeAvatarSheet() {
      document.getElementById('avatarSheet').classList.add('hidden');
      pendingB64 = null;
    }
    function cancelAvatarPick() {
      pendingB64 = null;
      document.getElementById('avatarPreviewArea').style.display  = 'none';
      document.getElementById('avatarActionRow').style.display    = 'none';
      document.getElementById('avatarMainOptions').style.display  = 'block';
      document.getElementById('avatarCloseRow').style.display     = 'block';
    }

    async function onImagePicked(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      input.value = '';
      try {
        const b64 = await compressImg(file, 300, 0.75);
        pendingB64 = b64;
        document.getElementById('avatarPreviewImg').src = b64;
        document.getElementById('avatarPreviewArea').style.display  = 'block';
        document.getElementById('avatarMainOptions').style.display  = 'none';
        document.getElementById('avatarCloseRow').style.display     = 'none';
        const ar = document.getElementById('avatarActionRow');
        ar.style.display = 'flex';
      } catch(e) {
        alert('Could not load image. Try another.');
      }
    }

    async function confirmSaveAvatar() {
      if (!pendingB64) return;
      const user = auth.currentUser;
      if (!user) return;
      document.getElementById('avatarPreviewArea').style.display    = 'none';
      document.getElementById('avatarActionRow').style.display      = 'none';
      document.getElementById('avatarCloseRow').style.display       = 'none';
      document.getElementById('avatarMainOptions').style.display    = 'none';
      document.getElementById('avatarUploadingState').style.display = 'block';
      try {
        await db.collection('users').doc(user.uid).set(
          { photoURL: pendingB64,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
        closeAvatarSheet();
        loadProfile(user);
      } catch(e) {
        alert('Error: ' + e.message);
        closeAvatarSheet();
      }
    }

    // ===== USERNAME CHECK =====
    async function checkUsername(val, uid) {
      const el = document.getElementById('usernameCheck');
      if (!val) { el.className='username-check'; return false; }
      if (val.length < 3) {
        el.className='username-check error';
        el.textContent='At least 3 characters'; return false;
      }
      if (!/^[a-z0-9_\.]+$/.test(val)) {
        el.className='username-check error';
        el.textContent='Only a-z, 0-9, _ and .'; return false;
      }
      el.className='username-check checking';
      el.textContent='Checking...';
      try {
        const snap = await db.collection('users')
          .where('username','==',val).get();
        const taken = snap.docs.some(d=>d.id!==uid);
        if (taken) {
          el.className='username-check error';
          el.textContent=`@${val} is taken`; return false;
        }
        el.className='username-check ok';
        el.textContent=`@${val} is available!`; return true;
      } catch(e) {
        el.className='username-check ok';
        el.textContent='Looks good!'; return true;
      }
    }

    function onUsernameInput(val, uid) {
      clearTimeout(usernameTimer);
      val = val.toLowerCase().replace(/\s/g,'');
      document.getElementById('usernameInput').value = val;
      const el = document.getElementById('usernameCheck');
      if (!val) { el.className='username-check'; return; }
      el.className='username-check checking';
      el.textContent='Checking...';
      usernameTimer = setTimeout(()=>checkUsername(val, uid), 700);
    }

    // ===== SAVE PROFILE =====
    async function saveProfile(uid) {
      const name     = document.getElementById('displayNameInput').value.trim();
      const username = document.getElementById('usernameInput').value.trim().toLowerCase();
      const bio      = document.getElementById('bioInput').value.trim();
      if (!name) { alert('Name required!'); return; }
      if (username && username.length < 3) {
        alert('Username min 3 chars!'); return;
      }
      if (username && !/^[a-z0-9_\.]+$/.test(username)) {
        alert('Username: only a-z, 0-9, _ and .'); return;
      }
      const btn = document.getElementById('saveProfileBtn');
      btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Saving...';
      btn.disabled=true;
      try {
        if (username && username !== currentUserData.username) {
          const ok = await checkUsername(username, uid);
          if (!ok) {
            btn.innerHTML='<i class="fas fa-floppy-disk"></i> Save Changes';
            btn.disabled=false; return;
          }
        }
        await auth.currentUser.updateProfile({ displayName: name });
        const upd = {
          name, bio, email: auth.currentUser.email,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (username) upd.username = username;
        await db.collection('users').doc(uid).set(upd, { merge: true });
        document.getElementById('profileSuccess').style.display='block';
        setTimeout(()=>{
          document.getElementById('profileSuccess').style.display='none';
        }, 3000);
        loadProfile(auth.currentUser);
      } catch(e) {
        document.getElementById('profileError').textContent='Error: '+e.message;
        document.getElementById('profileError').style.display='block';
        setTimeout(()=>{
          document.getElementById('profileError').style.display='none';
        }, 5000);
      } finally {
        btn.innerHTML='<i class="fas fa-floppy-disk"></i> Save Changes';
        btn.disabled=false;
      }
    }

    // ===== LOAD PROFILE =====
    async function loadProfile(user) {
      let userData = {};
      try {
        userData = await ensureUserDoc(user);
      } catch(e) { console.error(e); }
      currentUserData = { ...userData,
        displayName: user.displayName || userData.name || 'User',
        email: user.email,
        photoURL: userData.photoURL || ''
      };

      const name     = currentUserData.displayName;
      const username = currentUserData.username || '';
      const bio      = currentUserData.bio || '';
      const avatar   = currentUserData.photoURL || '';
      const watchlist= userData.watchlist || [];
      const initial  = name.charAt(0).toUpperCase();

      document.getElementById('profilePage').innerHTML = `

        <!-- CENTER PFP -->
        <div class="profile-top">
          <div class="profile-avatar-wrap"
            onclick="openAvatarSheet()">
            ${avatar
              ? `<img class="profile-avatar" src="${avatar}" alt="${name}"
                  onerror="this.style.display='none';
                    document.getElementById('avFb').style.display='flex'"/>
                <div class="profile-avatar-placeholder"
                  id="avFb" style="display:none">${initial}</div>`
              : `<div class="profile-avatar-placeholder">${initial}</div>`}
            <div class="profile-avatar-edit-btn"
              title="Change photo">
              <i class="fas fa-camera"></i>
            </div>
          </div>

          <div class="profile-display-name">${name}</div>
          ${username
            ? `<div class="profile-username-tag">@${username}</div>`
            : `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">
                No username</div>`}
          ${bio
            ? `<div class="profile-bio-text">${bio}</div>`
            : `<div style="font-size:12px;color:var(--text2);
                font-style:italic;text-align:center">No bio yet</div>`}
          <div class="profile-email-row">
            <i class="fas fa-envelope" style="font-size:10px"></i>
            ${user.email}
            ${user.emailVerified
              ? `<span style="color:#27ae60;font-size:10px;font-weight:700">
                  <i class="fas fa-circle-check"></i></span>`
              : `<span style="color:#e50914;font-size:10px;font-weight:700">
                  <i class="fas fa-circle-exclamation"></i></span>`}
          </div>

          <!-- Edit button -->
          <button onclick="toggleEditForm()" id="editToggleBtn"
            style="margin-top:14px;background:var(--bg3);
              border:1px solid var(--border);border-radius:20px;
              padding:7px 20px;font-size:13px;font-weight:600;
              color:var(--text);cursor:pointer;
              font-family:'Poppins',sans-serif;
              display:flex;align-items:center;gap:6px;
              transition:all 0.2s">
            <i class="fas fa-pen" style="font-size:11px"></i>
            Edit Profile
          </button>
        </div>

        <!-- STATS -->
        <div class="profile-stats">
          <div class="profile-stat-card">
            <div class="profile-stat-num">${watchlist.length}</div>
            <div class="profile-stat-label">Watchlist</div>
          </div>
          <div class="profile-stat-card">
            <div class="profile-stat-num"
              style="font-size:16px;color:var(--accent)">
              ${user.emailVerified
                ? '<i class="fas fa-shield-halved"></i>'
                : '<i class="fas fa-clock"></i>'}
            </div>
            <div class="profile-stat-label">
              ${user.emailVerified ? 'Verified' : 'Pending'}
            </div>
          </div>
          <div class="profile-stat-card">
            <div class="profile-stat-num" style="font-size:12px">
              ${new Date(user.metadata.creationTime||Date.now())
                .toLocaleDateString('en-US',{month:'short',year:'numeric'})}
            </div>
            <div class="profile-stat-label">Joined</div>
          </div>
        </div>

        <!-- EDIT FORM (hidden) -->
        <div class="profile-edit-card hidden" id="editFormCard">
          <h3>
            <i class="fas fa-pen" style="color:var(--accent)"></i>
            Edit Profile
          </h3>
          <div id="profileSuccess" class="profile-success">
            ✅ Saved!
          </div>
          <div id="profileError" class="profile-error"></div>

          <div class="form-group">
            <label>DISPLAY NAME *</label>
            <input type="text" id="displayNameInput"
              value="${name}" placeholder="Your name"/>
          </div>
          <div class="form-group">
            <label>USERNAME</label>
            <div style="position:relative">
              <span style="position:absolute;left:12px;top:50%;
                transform:translateY(-50%);color:var(--text2)">@</span>
              <input type="text" id="usernameInput"
                value="${username}" placeholder="yourname"
                style="padding-left:28px"
                oninput="onUsernameInput(this.value,'${user.uid}')"/>
            </div>
            <div id="usernameCheck" class="username-check"></div>
          </div>
          <div class="form-group">
            <label>BIO</label>
            <textarea id="bioInput"
              placeholder="About yourself..."
              style="min-height:80px">${bio}</textarea>
          </div>

          <button class="btn-primary" id="saveProfileBtn"
            onclick="saveProfile('${user.uid}')"
            style="width:100%">
            <i class="fas fa-floppy-disk"></i> Save Changes
          </button>

          <div style="margin-top:14px;text-align:center">
            <button onclick="logoutUser()"
              style="background:none;border:none;color:#e50914;
                font-size:13px;cursor:pointer;
                font-family:'Poppins',sans-serif;
                display:flex;align-items:center;gap:6px;margin:0 auto">
              <i class="fas fa-right-from-bracket"></i> Logout
            </button>
          </div>
        </div>

        <!-- WATCHLIST -->
        <div class="profile-watchlist-title">
          <i class="fas fa-bookmark" style="color:var(--accent)"></i>
          My Watchlist
        </div>
        <div id="watchlistGrid" class="grid">
          <div style="grid-column:1/-1;text-align:center;
            padding:30px;color:var(--text2)">
            <i class="fas fa-circle-notch fa-spin"></i>
          </div>
        </div>
      `;

      loadWatchlistGrid(watchlist);
    }

    function toggleEditForm() {
      const card = document.getElementById('editFormCard');
      const btn  = document.getElementById('editToggleBtn');
      if (card.classList.contains('hidden')) {
        card.classList.remove('hidden');
        btn.innerHTML = '<i class="fas fa-times" style="font-size:11px"></i> Close';
      } else {
        card.classList.add('hidden');
        btn.innerHTML = '<i class="fas fa-pen" style="font-size:11px"></i> Edit Profile';
      }
    }

    async function logoutUser() {
      if (!confirm('Log out?')) return;
      await auth.signOut();
      window.location.href = 'index.html';
    }

    // ===== WATCHLIST GRID =====
    async function loadWatchlistGrid(watchlist) {
      const grid = document.getElementById('watchlistGrid');
      if (!grid) return;
      if (!watchlist || watchlist.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;
            padding:30px;color:var(--text2)">
            <i class="fas fa-bookmark"
              style="font-size:32px;opacity:0.3;
                margin-bottom:12px;display:block"></i>
            Nothing saved yet.
          </div>`;
        return;
      }
      try {
        const animeList = [];
        for (let i=0;i<watchlist.length;i+=10) {
          const batch = watchlist.slice(i,i+10);
          const snap  = await db.collection('anime')
            .where(firebase.firestore.FieldPath.documentId(),'in',batch).get();
          snap.forEach(doc =>
            animeList.push({...doc.data(),firestoreId:doc.id}));
        }
        if (!animeList.length) {
          grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;
            padding:30px;color:var(--text2)">No anime found.</div>`;
          return;
        }
        grid.innerHTML='';
        animeList.forEach(anime=>{
          const card=document.createElement('div');
          card.className='card'; card.style.cursor='pointer';
          card.innerHTML=`
            <div>
              <img class="card-thumb" src="${anime.thumbnail||''}"
                alt="${anime.title}"
                onerror="this.style.background='var(--bg3)'"/>
            </div>
            <div class="card-info">
              <span class="card-badge">
                ${(anime.type||'ANIME').toUpperCase()}
              </span>
              <div class="card-title">${anime.title}</div>
              <div class="card-meta">
                <span class="card-rating">
                  <i class="fas fa-star"></i> ${anime.rating||'N/A'}
                </span>
                <span class="card-year">${anime.year||''}</span>
              </div>
            </div>`;
          card.addEventListener('click',()=>{
            window.location.href=`anime.html?id=${anime.firestoreId}`;
          });
          grid.appendChild(card);
        });
      } catch(e) {
        grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;
          padding:20px;color:var(--text2)">Could not load.</div>`;
      }
    }

    function showLoginPrompt() {
      document.getElementById('profilePage').innerHTML=`
        <div class="profile-login-prompt">
          <i class="fas fa-user-circle"></i>
          <h2>Not Logged In</h2>
          <p>Please login to view your profile.</p>
          <button class="btn-primary"
            onclick="window.location.href='index.html'"
            style="margin:0 auto;max-width:200px;
              display:flex;align-items:center;gap:8px">
            <i class="fas fa-right-to-bracket"></i> Go to Login
          </button>
        </div>`;
    }

    // ===== INIT =====
    loadTheme();
    auth.onAuthStateChanged(user=>{
      if (user) loadProfile(user);
      else showLoginPrompt();
    });
    document.getElementById('avatarSheet')
      .addEventListener('click',function(e){
        if(e.target===this) closeAvatarSheet();
      });
  </script>
</body>
</html>
