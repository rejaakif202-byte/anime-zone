<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Anime Verse</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .profile-page { max-width: 500px; margin: 0 auto; padding: 16px; }

    .profile-banner {
      width: 100%; height: 130px;
      background: linear-gradient(135deg, var(--accent), #2ca5e0);
      border-radius: 14px; position: relative;
      overflow: hidden; margin-bottom: 60px;
    }

    /* Avatar - NO BORDER */
    .profile-avatar-wrap {
      position: absolute; bottom: -48px; left: 20px;
      cursor: pointer;
    }
    .profile-avatar {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--bg3); object-fit: cover;
      display: block;
    }
    .profile-avatar-placeholder {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 700;
      color: #fff; font-family: 'Poppins', sans-serif;
    }
    .profile-avatar-edit {
      position: absolute; bottom: 0; right: 0;
      width: 26px; height: 26px;
      background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff;
    }

    /* Upload progress */
    .upload-progress {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: rgba(255,255,255,0.3);
      border-radius: 2px; overflow: hidden; display: none;
    }
    .upload-progress-bar {
      height: 100%; background: #fff;
      border-radius: 2px; width: 0%;
      transition: width 0.3s;
    }

    .profile-info-section {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }
    .profile-name {
      font-size: 20px; font-weight: 700;
      color: var(--text); margin-bottom: 2px;
    }
    .profile-username {
      font-size: 13px; color: var(--accent);
      font-weight: 600; margin-bottom: 8px;
    }
    .profile-bio { font-size: 13px; color: var(--text2); line-height: 1.6; }

    .profile-stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; margin-bottom: 14px;
    }
    .profile-stat-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 8px; text-align: center;
    }
    .profile-stat-num {
      font-size: 22px; font-weight: 700;
      color: var(--accent); line-height: 1; margin-bottom: 4px;
    }
    .profile-stat-label { font-size: 11px; color: var(--text2); }

    .profile-edit-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }
    .profile-edit-card h3 {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .username-check { font-size: 11px; margin-top: 4px; display: none; }
    .username-check.ok      { color: #27ae60; display: block; }
    .username-check.error   { color: #e50914; display: block; }
    .username-check.checking{ color: var(--text2); display: block; }

    .profile-watchlist-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin: 20px 0 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .profile-success {
      background: rgba(39,174,96,0.1); border: 1px solid #27ae60;
      color: #27ae60; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .profile-error {
      background: rgba(229,9,20,0.1); border: 1px solid #e50914;
      color: #e50914; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .profile-login-prompt {
      text-align: center; padding: 60px 20px; color: var(--text2);
    }
    .profile-login-prompt i {
      font-size: 64px; color: var(--accent); opacity: 0.5;
      margin-bottom: 20px;
    }
    .profile-login-prompt h2 {
      font-size: 22px; font-weight: 700;
      color: var(--text); margin-bottom: 10px;
    }

    /* Hidden file input */
    #galleryInput { display: none; }

    /* Avatar upload overlay */
    .avatar-upload-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 300;
      display: flex; align-items: flex-end;
      justify-content: center; padding: 20px;
      backdrop-filter: blur(4px);
    }
    .avatar-upload-sheet {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      width: 100%; max-width: 420px;
    }
    .avatar-upload-sheet h3 {
      font-size: 16px; font-weight: 700;
      margin-bottom: 16px; color: var(--text);
      text-align: center;
    }
    .avatar-option {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; border-radius: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      cursor: pointer; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .avatar-option:hover { border-color: var(--accent); }
    .avatar-option-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent); display: flex;
      align-items: center; justify-content: center;
      color: #fff; font-size: 18px; flex-shrink: 0;
    }
    .avatar-preview-wrap {
      text-align: center; margin-bottom: 14px; display: none;
    }
    .avatar-preview-img {
      width: 90px; height: 90px; border-radius: 50%;
      object-fit: cover; background: var(--bg3);
      margin: 0 auto 10px; display: block;
    }
    .avatar-uploading {
      text-align: center; padding: 20px;
      color: var(--text2); font-size: 13px; display: none;
    }
  </style>
</head>
<body>

  <!-- Hidden file input -->
  <input type="file" id="galleryInput" accept="image/*"
    onchange="handleImageSelected(this)"/>

  <!-- AVATAR UPLOAD MODAL -->
  <div class="avatar-upload-modal hidden" id="avatarModal">
    <div class="avatar-upload-sheet">
      <h3>Change Profile Picture</h3>

      <!-- Preview (shown after selection) -->
      <div class="avatar-preview-wrap" id="avatarPreviewWrap">
        <img id="avatarPreviewImg" class="avatar-preview-img" src="" alt=""/>
        <p style="font-size:12px;color:var(--text2)">
          Looks good? Click Save below.
        </p>
      </div>

      <!-- Uploading state -->
      <div class="avatar-uploading" id="avatarUploading">
        <i class="fas fa-circle-notch fa-spin"
          style="font-size:28px;color:var(--accent);margin-bottom:12px;display:block"></i>
        Saving your photo...
      </div>

      <!-- Options -->
      <div id="avatarOptions">
        <div class="avatar-option" onclick="triggerGallery()">
          <div class="avatar-option-icon">
            <i class="fas fa-image"></i>
          </div>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text)">
              Choose from Gallery
            </div>
            <div style="font-size:12px;color:var(--text2)">
              Select a photo from your device
            </div>
          </div>
          <i class="fas fa-chevron-right"
            style="color:var(--text2);margin-left:auto"></i>
        </div>
      </div>

      <!-- Save / Cancel buttons (shown after preview) -->
      <div id="avatarActionBtns"
        style="display:none;gap:10px;flex-direction:row">
        <button class="btn-outline"
          onclick="cancelAvatarUpload()" style="flex:1">
          Cancel
        </button>
        <button class="btn-primary"
          onclick="saveAvatar()" style="flex:1">
          <i class="fas fa-floppy-disk"></i> Save
        </button>
      </div>

      <!-- Close (when no preview) -->
      <div id="avatarCloseBtn">
        <button class="btn-outline"
          onclick="closeAvatarModal()" style="width:100%;margin-top:4px">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <a href="index.html" class="logo">ANIME <span>VERSE</span></a>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="profile-page" id="profilePage">
      <div class="empty-state" style="min-height:50vh">
        <i class="fas fa-circle-notch fa-spin"
          style="font-size:40px;color:var(--accent)"></i>
        <h2 style="margin-top:16px">Loading...</h2>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="data.js"></script>
  <script>
    // ===== THEME =====
    function toggleTheme() {
      const html = document.documentElement;
      const btn  = document.getElementById('themeBtn');
      const dark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', dark ? 'light' : 'dark');
      btn.innerHTML = dark
        ? '<i class="fas fa-sun"></i>'
        : '<i class="fas fa-moon"></i>';
      localStorage.setItem('av_theme', dark ? 'light' : 'dark');
    }
    function loadTheme() {
      const saved = localStorage.getItem('av_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerHTML = saved === 'dark'
        ? '<i class="fas fa-moon"></i>'
        : '<i class="fas fa-sun"></i>';
    }

    let currentUserData  = {};
    let pendingAvatarB64 = null;
    let usernameTimer    = null;

    // ===== ENSURE USER DOC EXISTS =====
    async function ensureUserDoc(user) {
      const ref = db.collection('users').doc(user.uid);
      const doc = await ref.get();
      if (!doc.exists) {
        await ref.set({
          name:      user.displayName || 'User',
          email:     user.email,
          watchlist: [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      return (await ref.get()).data();
    }

    // ===== COMPRESS IMAGE TO BASE64 =====
    function compressImage(file, maxWidth = 300, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) {
              h = (h * maxWidth) / w;
              w = maxWidth;
            }
            canvas.width  = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const b64 = canvas.toDataURL('image/jpeg', quality);
            resolve(b64);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ===== AVATAR MODAL =====
    function openAvatarModal() {
      pendingAvatarB64 = null;
      document.getElementById('avatarModal').classList.remove('hidden');
      document.getElementById('avatarOptions').style.display  = 'block';
      document.getElementById('avatarPreviewWrap').style.display = 'none';
      document.getElementById('avatarUploading').style.display = 'none';
      document.getElementById('avatarActionBtns').style.display = 'none';
      document.getElementById('avatarCloseBtn').style.display  = 'block';
    }
    function closeAvatarModal() {
      document.getElementById('avatarModal').classList.add('hidden');
      pendingAvatarB64 = null;
    }
    function triggerGallery() {
      document.getElementById('galleryInput').click();
    }
    function cancelAvatarUpload() {
      pendingAvatarB64 = null;
      document.getElementById('avatarPreviewWrap').style.display = 'none';
      document.getElementById('avatarActionBtns').style.display  = 'none';
      document.getElementById('avatarOptions').style.display     = 'block';
      document.getElementById('avatarCloseBtn').style.display    = 'block';
    }

    async function handleImageSelected(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      input.value = '';

      try {
        const b64 = await compressImage(file, 300, 0.75);
        pendingAvatarB64 = b64;

        // Show preview
        document.getElementById('avatarPreviewImg').src  = b64;
        document.getElementById('avatarPreviewWrap').style.display = 'block';
        document.getElementById('avatarOptions').style.display      = 'none';
        document.getElementById('avatarCloseBtn').style.display     = 'none';
        const actionBtns = document.getElementById('avatarActionBtns');
        actionBtns.style.display = 'flex';
      } catch(e) {
        alert('Could not load image. Try another photo.');
      }
    }

    async function saveAvatar() {
      if (!pendingAvatarB64) return;
      const user = auth.currentUser;
      if (!user) return;

      document.getElementById('avatarOptions').style.display      = 'none';
      document.getElementById('avatarPreviewWrap').style.display  = 'none';
      document.getElementById('avatarActionBtns').style.display   = 'none';
      document.getElementById('avatarCloseBtn').style.display     = 'none';
      document.getElementById('avatarUploading').style.display    = 'block';

      try {
        // Save base64 to Firestore (compressed ~30-60KB)
        await db.collection('users').doc(user.uid).set(
          { photoURL: pendingAvatarB64, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
        // Update Auth profile (store a flag, actual data in Firestore)
        await user.updateProfile({ photoURL: 'firestore' });

        closeAvatarModal();
        loadProfile(user);
      } catch(e) {
        alert('Error saving photo: ' + e.message);
        closeAvatarModal();
      }
    }

    // ===== USERNAME CHECK =====
    async function checkUsername(username, uid) {
      const el = document.getElementById('usernameCheck');
      if (!username) { el.className = 'username-check'; return false; }
      if (username.length < 3) {
        el.className = 'username-check error';
        el.textContent = 'At least 3 characters required';
        return false;
      }
      if (!/^[a-z0-9_\.]+$/.test(username)) {
        el.className = 'username-check error';
        el.textContent = 'Only a-z, 0-9, _ and . allowed';
        return false;
      }
      el.className = 'username-check checking';
      el.textContent = 'Checking...';
      try {
        const snap = await db.collection('users')
          .where('username', '==', username).get();
        const taken = snap.docs.some(d => d.id !== uid);
        if (taken) {
          el.className = 'username-check error';
          el.textContent = `@${username} is already taken`;
          return false;
        }
        el.className = 'username-check ok';
        el.textContent = `@${username} is available!`;
        return true;
      } catch(e) {
        el.className = 'username-check ok';
        el.textContent = 'Looks good!';
        return true;
      }
    }

    function onUsernameInput(val, uid) {
      clearTimeout(usernameTimer);
      val = val.toLowerCase().replace(/\s/g, '');
      document.getElementById('usernameInput').value = val;
      if (!val) {
        document.getElementById('usernameCheck').className = 'username-check';
        return;
      }
      document.getElementById('usernameCheck').className = 'username-check checking';
      document.getElementById('usernameCheck').textContent = 'Checking...';
      usernameTimer = setTimeout(() => checkUsername(val, uid), 700);
    }

    // ===== SAVE PROFILE =====
    async function saveProfile(uid) {
      const displayName = document.getElementById('displayNameInput').value.trim();
      const username    = document.getElementById('usernameInput').value.trim().toLowerCase();
      const bio         = document.getElementById('bioInput').value.trim();

      if (!displayName) { alert('Display name is required!'); return; }

      if (username && username.length < 3) {
        alert('Username must be at least 3 characters!'); return;
      }
      if (username && !/^[a-z0-9_\.]+$/.test(username)) {
        alert('Username: only a-z, 0-9, _ and . allowed!'); return;
      }

      const btn = document.getElementById('saveProfileBtn');
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Saving...';
      btn.disabled  = true;

      try {
        // Check username if changed
        if (username && username !== currentUserData.username) {
          const ok = await checkUsername(username, uid);
          if (!ok) {
            btn.innerHTML = '<i class="fas fa-floppy-disk"></i> Save Changes';
            btn.disabled  = false;
            return;
          }
        }

        // Update Firebase Auth
        await auth.currentUser.updateProfile({ displayName });

        // Use SET with merge — works even if doc doesn't exist!
        const updateObj = {
          name:      displayName,
          bio:       bio,
          email:     auth.currentUser.email,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (username) updateObj.username = username;

        await db.collection('users').doc(uid).set(updateObj, { merge: true });

        document.getElementById('profileSuccess').style.display = 'block';
        setTimeout(() => {
          document.getElementById('profileSuccess').style.display = 'none';
        }, 3000);

        const user = auth.currentUser;
        if (user) loadProfile(user);

      } catch(e) {
        document.getElementById('profileError').textContent =
          'Error: ' + e.message;
        document.getElementById('profileError').style.display = 'block';
        setTimeout(() => {
          document.getElementById('profileError').style.display = 'none';
        }, 5000);
      } finally {
        btn.innerHTML = '<i class="fas fa-floppy-disk"></i> Save Changes';
        btn.disabled  = false;
      }
    }

    // ===== LOAD PROFILE =====
    async function loadProfile(user) {
      let userData = {};
      try {
        // Ensure doc exists
        userData = await ensureUserDoc(user);
      } catch(e) {
        console.error('Profile load error:', e);
      }

      currentUserData = {
        ...userData,
        displayName: user.displayName || userData.name || 'User',
        email:       user.email,
        photoURL:    userData.photoURL || user.photoURL || '',
      };

      const name     = currentUserData.displayName;
      const username = currentUserData.username || '';
      const bio      = currentUserData.bio || '';
      const avatar   = currentUserData.photoURL || '';
      const watchlist= userData.watchlist || [];
      const initial  = name.charAt(0).toUpperCase();

      const container = document.getElementById('profilePage');
      container.innerHTML = `
        <!-- BANNER + AVATAR -->
        <div style="position:relative;margin-bottom:60px">
          <div class="profile-banner"></div>
          <div class="profile-avatar-wrap" onclick="openAvatarModal()">
            ${avatar && avatar !== 'firestore'
              ? `<img class="profile-avatar" src="${avatar}" alt="${name}"
                  onerror="this.style.display='none';
                    document.getElementById('avFallback').style.display='flex'"/>
                <div class="profile-avatar-placeholder"
                  id="avFallback" style="display:none">${initial}</div>`
              : `<div class="profile-avatar-placeholder">${initial}</div>`}
            <div class="profile-avatar-edit">
              <i class="fas fa-camera" style="font-size:10px"></i>
            </div>
          </div>
          <div style="position:absolute;bottom:-44px;right:0">
            <button class="btn-outline"
              onclick="toggleEditForm()" id="editToggleBtn"
              style="font-size:13px;padding:8px 16px;
                display:flex;align-items:center;gap:6px">
              <i class="fas fa-pen"></i> Edit Profile
            </button>
          </div>
        </div>

        <!-- INFO -->
        <div class="profile-info-section">
          <div class="profile-name">${name}</div>
          ${username
            ? `<div class="profile-username">@${username}</div>`
            : `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">
                No username set</div>`}
          ${bio
            ? `<div class="profile-bio">${bio}</div>`
            : `<div style="font-size:12px;color:var(--text2);font-style:italic">
                No bio yet</div>`}
          <div style="font-size:12px;color:var(--text2);margin-top:8px;
            display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <i class="fas fa-envelope" style="font-size:11px"></i>
            ${user.email}
            ${user.emailVerified
              ? `<span style="color:#27ae60;font-size:10px;font-weight:700">
                  <i class="fas fa-circle-check"></i> Verified</span>`
              : `<span style="color:#e50914;font-size:10px;font-weight:700">
                  <i class="fas fa-circle-exclamation"></i> Not verified</span>`}
          </div>
        </div>

        <!-- STATS -->
        <div class="profile-stats">
          <div class="profile-stat-card">
            <div class="profile-stat-num">${watchlist.length}</div>
            <div class="profile-stat-label">Watchlist</div>
          </div>
          <div class="profile-stat-card">
            <div class="profile-stat-num"
              style="font-size:16px;color:var(--accent)">
              ${user.emailVerified
                ? '<i class="fas fa-shield-halved"></i>'
                : '<i class="fas fa-clock"></i>'}
            </div>
            <div class="profile-stat-label">
              ${user.emailVerified ? 'Verified' : 'Pending'}
            </div>
          </div>
          <div class="profile-stat-card">
            <div class="profile-stat-num" style="font-size:12px">
              ${new Date(user.metadata.creationTime || Date.now())
                .toLocaleDateString('en-US',{month:'short',year:'numeric'})}
            </div>
            <div class="profile-stat-label">Joined</div>
          </div>
        </div>

        <!-- EDIT FORM -->
        <div class="profile-edit-card hidden" id="editFormCard">
          <h3>
            <i class="fas fa-pen" style="color:var(--accent)"></i>
            Edit Profile
          </h3>
          <div id="profileSuccess" class="profile-success">
            ✅ Profile updated!
          </div>
          <div id="profileError" class="profile-error"></div>

          <div class="form-group">
            <label>DISPLAY NAME *</label>
            <input type="text" id="displayNameInput"
              value="${name}" placeholder="Your name"/>
          </div>
          <div class="form-group">
            <label>USERNAME</label>
            <div style="position:relative">
              <span style="position:absolute;left:12px;top:50%;
                transform:translateY(-50%);color:var(--text2);
                font-size:14px">@</span>
              <input type="text" id="usernameInput"
                value="${username}" placeholder="yourname"
                style="padding-left:28px"
                oninput="onUsernameInput(this.value,'${user.uid}')"/>
            </div>
            <div id="usernameCheck" class="username-check"></div>
            <p style="font-size:11px;color:var(--text2);margin-top:4px">
              Only a-z, 0-9, _ and . — must be unique
            </p>
          </div>
          <div class="form-group">
            <label>BIO</label>
            <textarea id="bioInput"
              placeholder="Tell something about yourself..."
              style="min-height:80px">${bio}</textarea>
          </div>

          <div style="background:rgba(200,119,64,0.08);
            border:1px solid var(--accent);border-radius:8px;
            padding:10px 12px;margin-bottom:14px;font-size:12px;
            color:var(--text2);display:flex;gap:8px;align-items:flex-start">
            <i class="fas fa-camera"
              style="color:var(--accent);margin-top:2px;flex-shrink:0"></i>
            <span>Profile picture change karne ke liye oopar avatar pe tap karo. Gallery se photo select hogi.</span>
          </div>

          <button class="btn-primary" id="saveProfileBtn"
            onclick="saveProfile('${user.uid}')"
            style="width:100%">
            <i class="fas fa-floppy-disk"></i> Save Changes
          </button>

          <div style="margin-top:14px;text-align:center">
            <button onclick="logoutUser()"
              style="background:none;border:none;color:#e50914;
                font-size:13px;cursor:pointer;font-family:'Poppins',sans-serif;
                display:flex;align-items:center;gap:6px;margin:0 auto">
              <i class="fas fa-right-from-bracket"></i> Logout
            </button>
          </div>
        </div>

        <!-- WATCHLIST -->
        <div class="profile-watchlist-title">
          <i class="fas fa-bookmark" style="color:var(--accent)"></i>
          My Watchlist
        </div>
        <div id="watchlistGrid" class="grid">
          <div style="grid-column:1/-1;text-align:center;
            padding:30px;color:var(--text2)">
            <i class="fas fa-circle-notch fa-spin"></i> Loading...
          </div>
        </div>
      `;

      loadWatchlistGrid(watchlist);
    }

    function toggleEditForm() {
      const card = document.getElementById('editFormCard');
      const btn  = document.getElementById('editToggleBtn');
      if (card.classList.contains('hidden')) {
        card.classList.remove('hidden');
        btn.innerHTML = '<i class="fas fa-times"></i> Close';
      } else {
        card.classList.add('hidden');
        btn.innerHTML = '<i class="fas fa-pen"></i> Edit Profile';
      }
    }

    async function logoutUser() {
      if (!confirm('Log out?')) return;
      await auth.signOut();
      window.location.href = 'index.html';
    }

    // ===== WATCHLIST GRID =====
    async function loadWatchlistGrid(watchlist) {
      const grid = document.getElementById('watchlistGrid');
      if (!grid) return;

      if (!watchlist || watchlist.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;
            padding:30px;color:var(--text2);font-size:14px">
            <i class="fas fa-bookmark"
              style="font-size:32px;opacity:0.3;
                margin-bottom:12px;display:block"></i>
            Nothing saved yet.
          </div>`;
        return;
      }

      try {
        const animeList = [];
        const batches   = [];
        for (let i = 0; i < watchlist.length; i += 10) {
          batches.push(watchlist.slice(i, i + 10));
        }
        for (const batch of batches) {
          const snap = await db.collection('anime')
            .where(firebase.firestore.FieldPath.documentId(), 'in', batch)
            .get();
          snap.forEach(doc =>
            animeList.push({ ...doc.data(), firestoreId: doc.id })
          );
        }
        if (!animeList.length) {
          grid.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;
              padding:30px;color:var(--text2)">No anime found.</div>`;
          return;
        }
        grid.innerHTML = '';
        animeList.forEach(anime => {
          const card = document.createElement('div');
          card.className   = 'card';
          card.style.cursor = 'pointer';
          card.innerHTML   = `
            <div style="position:relative">
              <img class="card-thumb" src="${anime.thumbnail||''}"
                alt="${anime.title}"
                onerror="this.style.background='var(--bg3)'"/>
            </div>
            <div class="card-info">
              <span class="card-badge">
                ${(anime.type||'ANIME').toUpperCase()}
              </span>
              <div class="card-title">${anime.title}</div>
              <div class="card-meta">
                <span class="card-rating">
                  <i class="fas fa-star"></i> ${anime.rating||'N/A'}
                </span>
                <span class="card-year">${anime.year||''}</span>
              </div>
            </div>`;
          card.addEventListener('click', () => {
            window.location.href = `anime.html?id=${anime.firestoreId}`;
          });
          grid.appendChild(card);
        });
      } catch(e) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;
            padding:20px;color:var(--text2)">
            Could not load watchlist.
          </div>`;
      }
    }

    function showLoginPrompt() {
      document.getElementById('profilePage').innerHTML = `
        <div class="profile-login-prompt">
          <i class="fas fa-user-circle"></i>
          <h2>Not Logged In</h2>
          <p>Please login to view your profile.</p>
          <button class="btn-primary"
            onclick="window.location.href='index.html'"
            style="margin:0 auto;max-width:200px;
              display:flex;align-items:center;gap:8px">
            <i class="fas fa-right-to-bracket"></i> Go to Login
          </button>
        </div>`;
    }

    // ===== INIT =====
    loadTheme();
    auth.onAuthStateChanged(user => {
      if (user) loadProfile(user);
      else showLoginPrompt();
    });

    // Close modal on outside click
    document.getElementById('avatarModal')
      .addEventListener('click', function(e) {
        if (e.target === this) closeAvatarModal();
      });
  </script>
</body>
</html>
