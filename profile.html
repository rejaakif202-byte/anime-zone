<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Anime Verse</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { background: var(--bg); }
    .profile-page { max-width: 500px; margin: 0 auto; padding-bottom: 40px; }

    /* HERO GRADIENT TOP */
    .profile-hero {
      width: 100%;
      min-height: 200px;
      background: linear-gradient(160deg, var(--accent) 0%, #8e44ad 60%, #2ca5e0 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      padding-bottom: 70px;
    }
    .profile-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50px;
      background: var(--bg);
      border-radius: 28px 28px 0 0;
    }

    /* AVATAR — centered, NO border */
    .profile-avatar-wrap {
      position: absolute;
      bottom: -52px;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
      z-index: 2;
    }
    .profile-avatar-img {
      width: 104px; height: 104px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: var(--bg3);
    }
    .profile-avatar-initial {
      width: 104px; height: 104px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8e44ad);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; font-weight: 700;
      color: #fff; font-family: 'Poppins', sans-serif;
    }
    .profile-avatar-cam {
      position: absolute;
      bottom: 3px; right: 3px;
      width: 30px; height: 30px;
      background: var(--bg2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text2);
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    .profile-avatar-cam:hover {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* INFO SECTION */
    .profile-info {
      padding: 64px 20px 20px;
      text-align: center;
    }
    .profile-display-name {
      font-size: 24px; font-weight: 700;
      color: var(--text); line-height: 1.2; margin-bottom: 4px;
    }
    .profile-uname {
      font-size: 14px; color: var(--accent);
      font-weight: 600; margin-bottom: 10px;
    }
    .profile-bio {
      font-size: 13px; color: var(--text2);
      line-height: 1.7; max-width: 320px;
      margin: 0 auto 12px;
    }
    .profile-email-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
      font-size: 11px; color: var(--text2);
    }

    /* STATS ROW */
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 16px;
      margin-bottom: 16px;
    }
    .profile-stat {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      transition: transform 0.15s;
    }
    .profile-stat:active { transform: scale(0.97); }
    .profile-stat-num {
      font-size: 24px; font-weight: 700;
      color: var(--accent); line-height: 1;
      margin-bottom: 6px;
    }
    .profile-stat-label {
      font-size: 11px; color: var(--text2);
      font-weight: 500; letter-spacing: 0.3px;
    }

    /* EDIT CARD */
    .profile-card {
      margin: 0 16px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .profile-card-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .profile-card-header h3 {
      font-size: 14px; font-weight: 700;
      color: var(--text); margin: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .profile-card-body { padding: 16px; }

    .username-check { font-size: 11px; margin-top: 4px; display: none; }
    .username-check.ok      { color: #27ae60; display: block; }
    .username-check.error   { color: #e50914; display: block; }
    .username-check.checking{ color: var(--text2); display: block; }

    .pf-success {
      background: rgba(39,174,96,0.1); border: 1px solid #27ae60;
      color: #27ae60; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .pf-error {
      background: rgba(229,9,20,0.1); border: 1px solid #e50914;
      color: #e50914; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }

    /* WATCHLIST */
    .profile-section-title {
      font-size: 15px; font-weight: 700;
      color: var(--text);
      padding: 0 16px;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }

    /* AVATAR SHEET */
    .avatar-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300; display: flex;
      align-items: flex-end; justify-content: center;
      padding: 16px; backdrop-filter: blur(6px);
    }
    .avatar-sheet {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 20px;
      width: 100%; max-width: 420px;
    }
    .avatar-sheet h3 {
      font-size: 15px; font-weight: 700;
      color: var(--text); margin-bottom: 16px;
      text-align: center;
    }
    .avatar-option-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; border-radius: 12px;
      background: var(--bg3); border: 1px solid var(--border);
      cursor: pointer; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .avatar-option-row:hover { border-color: var(--accent); }
    .avatar-option-icon {
      width: 44px; height: 44px; border-radius: 11px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px; flex-shrink: 0;
    }
    .avatar-preview-circle {
      width: 88px; height: 88px; border-radius: 50%;
      object-fit: cover; background: var(--bg3);
      margin: 0 auto 12px; display: block;
    }
    #galleryInput { display: none; }

    .profile-login {
      text-align: center; padding: 80px 20px; color: var(--text2);
    }
    .profile-login i {
      font-size: 72px; color: var(--accent); opacity: 0.4;
      margin-bottom: 24px; display: block;
    }
    .profile-login h2 {
      font-size: 24px; font-weight: 700;
      color: var(--text); margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <input type="file" id="galleryInput" accept="image/*"
    onchange="onGalleryPick(this)"/>

  <!-- AVATAR SHEET -->
  <div class="avatar-overlay hidden" id="avatarOverlay">
    <div class="avatar-sheet">
      <h3>Change Profile Picture</h3>

      <div id="avatarPreviewWrap" style="display:none;text-align:center;margin-bottom:14px">
        <img id="avatarPreviewImg" class="avatar-preview-circle" src="" alt=""/>
        <p style="font-size:12px;color:var(--text2)">Preview</p>
      </div>

      <div id="avatarUploading" style="display:none;text-align:center;padding:20px 0">
        <i class="fas fa-circle-notch fa-spin"
          style="font-size:28px;color:var(--accent);
            margin-bottom:10px;display:block"></i>
        <div style="font-size:13px;color:var(--text2)">Saving photo...</div>
      </div>

      <div id="avatarMainOpts">
        <div class="avatar-option-row"
          onclick="document.getElementById('galleryInput').click()">
          <div class="avatar-option-icon">
            <i class="fas fa-images"></i>
          </div>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text)">
              Choose from Gallery
            </div>
            <div style="font-size:12px;color:var(--text2)">
              Select a photo from your device
            </div>
          </div>
          <i class="fas fa-chevron-right"
            style="color:var(--text2);margin-left:auto;font-size:12px"></i>
        </div>
      </div>

      <div id="avatarActionRow"
        style="display:none;gap:10px;margin-top:4px">
        <button class="btn-outline"
          onclick="cancelPick()" style="flex:1">
          Cancel
        </button>
        <button class="btn-primary"
          onclick="confirmAvatar()" style="flex:1">
          <i class="fas fa-check"></i> Save
        </button>
      </div>

      <div id="avatarCloseRow" style="margin-top:4px">
        <button class="btn-outline"
          onclick="closeAvatarSheet()" style="width:100%">Close</button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <a href="index.html" class="logo">ANIME <span>VERSE</span></a>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <main>
    <div class="profile-page" id="profilePage">
      <div style="display:flex;align-items:center;justify-content:center;
        min-height:60vh;flex-direction:column;gap:14px">
        <i class="fas fa-circle-notch fa-spin"
          style="font-size:40px;color:var(--accent)"></i>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="data.js"></script>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const btn  = document.getElementById('themeBtn');
      const dark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', dark ? 'light' : 'dark');
      btn.innerHTML = dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      localStorage.setItem('av_theme', dark ? 'light' : 'dark');
    }
    function loadTheme() {
      const saved = localStorage.getItem('av_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerHTML = saved === 'dark'
        ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }

    let currentUserData = {};
    let pendingB64 = null;
    let unameTimer = null;

    async function ensureDoc(user) {
      const ref = db.collection('users').doc(user.uid);
      const doc = await ref.get();
      if (!doc.exists) {
        await ref.set({
          name:      user.displayName || 'User',
          email:     user.email,
          watchlist: [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      return (await ref.get()).data();
    }

    function compressImg(file, maxW=300, quality=0.78) {
      return new Promise((res,rej)=>{
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = ()=>{
            let w=img.width, h=img.height;
            if(w>maxW){h=(h*maxW)/w;w=maxW;}
            const c=document.createElement('canvas');
            c.width=w; c.height=h;
            c.getContext('2d').drawImage(img,0,0,w,h);
            res(c.toDataURL('image/jpeg',quality));
          };
          img.onerror=rej; img.src=e.target.result;
        };
        reader.onerror=rej; reader.readAsDataURL(file);
      });
    }

    // ===== AVATAR =====
    function openAvatarSheet() {
      pendingB64=null;
      document.getElementById('avatarOverlay').classList.remove('hidden');
      document.getElementById('avatarMainOpts').style.display    = 'block';
      document.getElementById('avatarPreviewWrap').style.display = 'none';
      document.getElementById('avatarActionRow').style.display   = 'none';
      document.getElementById('avatarCloseRow').style.display    = 'block';
      document.getElementById('avatarUploading').style.display   = 'none';
    }
    function closeAvatarSheet() {
      document.getElementById('avatarOverlay').classList.add('hidden');
    }
    function cancelPick() {
      pendingB64=null;
      document.getElementById('avatarPreviewWrap').style.display = 'none';
      document.getElementById('avatarActionRow').style.display   = 'none';
      document.getElementById('avatarMainOpts').style.display    = 'block';
      document.getElementById('avatarCloseRow').style.display    = 'block';
    }
    async function onGalleryPick(input) {
      const file = input.files&&input.files[0];
      if(!file) return; input.value='';
      try {
        const b64 = await compressImg(file,300,0.78);
        pendingB64=b64;
        document.getElementById('avatarPreviewImg').src=b64;
        document.getElementById('avatarPreviewWrap').style.display='block';
        document.getElementById('avatarMainOpts').style.display  ='none';
        document.getElementById('avatarCloseRow').style.display  ='none';
        const ar=document.getElementById('avatarActionRow');
        ar.style.display='flex'; ar.style.flexDirection='row';
      } catch(e) { alert('Could not load image. Try another.'); }
    }
    async function confirmAvatar() {
      if(!pendingB64) return;
      const user=auth.currentUser;
      if(!user) return;
      ['avatarPreviewWrap','avatarActionRow','avatarMainOpts',
       'avatarCloseRow'].forEach(id=>{
        document.getElementById(id).style.display='none';
      });
      document.getElementById('avatarUploading').style.display='block';
      try {
        await db.collection('users').doc(user.uid).set(
          { photoURL: pendingB64,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
        closeAvatarSheet();
        loadProfile(user);
      } catch(e) { alert('Error: '+e.message); closeAvatarSheet(); }
    }

    // ===== USERNAME CHECK =====
    async function checkUname(val, uid) {
      const el=document.getElementById('usernameCheck');
      if(!val){el.className='username-check';return false;}
      if(val.length<3){el.className='username-check error';
        el.textContent='Min 3 characters';return false;}
      if(!/^[a-z0-9_\.]+$/.test(val)){el.className='username-check error';
        el.textContent='Only a-z, 0-9, _ and .';return false;}
      el.className='username-check checking'; el.textContent='Checking...';
      try {
        const snap=await db.collection('users').where('username','==',val).get();
        const taken=snap.docs.some(d=>d.id!==uid);
        if(taken){el.className='username-check error';
          el.textContent=`@${val} is taken`;return false;}
        el.className='username-check ok';
        el.textContent=`@${val} is available!`;return true;
      } catch(e){el.className='username-check ok';
        el.textContent='Looks good!';return true;}
    }
    function onUnameInput(val, uid) {
      clearTimeout(unameTimer);
      val=val.toLowerCase().replace(/\s/g,'');
      document.getElementById('usernameInput').value=val;
      const el=document.getElementById('usernameCheck');
      if(!val){el.className='username-check';return;}
      el.className='username-check checking'; el.textContent='Checking...';
      unameTimer=setTimeout(()=>checkUname(val,uid),700);
    }

    // ===== SAVE PROFILE =====
    async function saveProfile(uid) {
      const name=document.getElementById('pfNameInput').value.trim();
      const uname=document.getElementById('usernameInput').value.trim().toLowerCase();
      const bio=document.getElementById('pfBioInput').value.trim();
      if(!name){alert('Name required!');return;}
      const btn=document.getElementById('saveProfileBtn');
      btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Saving...';
      btn.disabled=true;
      try {
        if(uname&&uname!==currentUserData.username){
          const ok=await checkUname(uname,uid);
          if(!ok){
            btn.innerHTML='<i class="fas fa-floppy-disk"></i> Save Changes';
            btn.disabled=false; return;
          }
        }
        await auth.currentUser.updateProfile({displayName:name});
        const upd={
          name, bio, email:auth.currentUser.email,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        };
        if(uname) upd.username=uname;
        await db.collection('users').doc(uid).set(upd,{merge:true});
        document.getElementById('pfSuccess').style.display='block';
        setTimeout(()=>document.getElementById('pfSuccess').style.display='none',3000);
        loadProfile(auth.currentUser);
      } catch(e){
        document.getElementById('pfError').textContent='Error: '+e.message;
        document.getElementById('pfError').style.display='block';
        setTimeout(()=>document.getElementById('pfError').style.display='none',5000);
      } finally {
        btn.innerHTML='<i class="fas fa-floppy-disk"></i> Save Changes';
        btn.disabled=false;
      }
    }

    // ===== LOAD PROFILE =====
    async function loadProfile(user) {
      let userData={};
      try { userData=await ensureDoc(user); } catch(e){}
      currentUserData={...userData,
        displayName:user.displayName||userData.name||'User',
        email:user.email,
        photoURL:userData.photoURL||''
      };

      const name     = currentUserData.displayName;
      const uname    = currentUserData.username||'';
      const bio      = currentUserData.bio||'';
      const avatar   = currentUserData.photoURL||'';
      const watchlist= userData.watchlist||[];
      const initial  = name.charAt(0).toUpperCase();

      document.getElementById('profilePage').innerHTML = `
        <!-- HERO + AVATAR -->
        <div class="profile-hero">
          <div style="position:absolute;inset:0;
            background:linear-gradient(160deg,
              rgba(200,119,64,0.9) 0%,
              rgba(142,68,173,0.85) 55%,
              rgba(44,165,224,0.9) 100%)">
          </div>
          <div class="profile-avatar-wrap" onclick="openAvatarSheet()">
            ${avatar
              ? `<img class="profile-avatar-img" src="${avatar}" alt="${name}"
                  onerror="this.style.display='none';
                    document.getElementById('avFb').style.display='flex'"/>
                <div class="profile-avatar-initial"
                  id="avFb" style="display:none">${initial}</div>`
              : `<div class="profile-avatar-initial">${initial}</div>`}
            <div class="profile-avatar-cam">
              <i class="fas fa-camera" style="font-size:11px"></i>
            </div>
          </div>
        </div>

        <!-- INFO -->
        <div class="profile-info">
          <div class="profile-display-name">${name}</div>
          ${uname
            ? `<div class="profile-uname">@${uname}</div>`
            : `<div style="font-size:12px;color:var(--text2);
                margin-bottom:8px">No username set</div>`}
          ${bio
            ? `<div class="profile-bio">${bio}</div>`
            : `<div class="profile-bio" style="font-style:italic">
                No bio yet</div>`}
          <div class="profile-email-badge">
            <i class="fas fa-envelope" style="font-size:10px"></i>
            ${user.email}
            ${user.emailVerified
              ? `<span style="color:#27ae60">
                  <i class="fas fa-circle-check"></i></span>`
              : `<span style="color:#e50914">
                  <i class="fas fa-circle-exclamation"></i></span>`}
          </div>

          <div style="margin-top:16px;display:flex;gap:10px;
            justify-content:center">
            <button class="btn-outline"
              onclick="toggleEdit()" id="editToggleBtn"
              style="font-size:13px;border-radius:20px;
                padding:8px 22px;font-weight:600">
              <i class="fas fa-pen" style="font-size:11px"></i>
              Edit Profile
            </button>
            <button onclick="doLogout()"
              style="background:rgba(229,9,20,0.08);
                border:1px solid rgba(229,9,20,0.3);
                color:#e50914;border-radius:20px;
                padding:8px 22px;font-size:13px;
                font-weight:600;cursor:pointer;
                font-family:'Poppins',sans-serif">
              <i class="fas fa-right-from-bracket"
                style="font-size:11px"></i>
              Logout
            </button>
          </div>
        </div>

        <!-- STATS -->
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-num">${watchlist.length}</div>
            <div class="profile-stat-label">Watchlist</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num"
              style="font-size:20px">
              ${user.emailVerified
                ? '<i class="fas fa-shield-halved" style="color:#27ae60"></i>'
                : '<i class="fas fa-clock" style="color:#f39c12"></i>'}
            </div>
            <div class="profile-stat-label">
              ${user.emailVerified ? 'Verified' : 'Pending'}
            </div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num" style="font-size:13px;
              font-weight:700">
              ${new Date(user.metadata.creationTime||Date.now())
                .toLocaleDateString('en-US',{month:'short',year:'numeric'})}
            </div>
            <div class="profile-stat-label">Joined</div>
          </div>
        </div>

        <!-- EDIT FORM (hidden) -->
        <div class="profile-card hidden" id="editCard">
          <div class="profile-card-header">
            <h3>
              <i class="fas fa-pen" style="color:var(--accent)"></i>
              Edit Profile
            </h3>
          </div>
          <div class="profile-card-body">
            <div id="pfSuccess" class="pf-success">✅ Profile updated!</div>
            <div id="pfError"   class="pf-error"></div>

            <div class="form-group">
              <label>DISPLAY NAME *</label>
              <input type="text" id="pfNameInput"
                value="${name}" placeholder="Your name"/>
            </div>
            <div class="form-group">
              <label>USERNAME</label>
              <div style="position:relative">
                <span style="position:absolute;left:12px;top:50%;
                  transform:translateY(-50%);color:var(--text2)">@</span>
                <input type="text" id="usernameInput"
                  value="${uname}" placeholder="yourname"
                  style="padding-left:28px"
                  oninput="onUnameInput(this.value,'${user.uid}')"/>
              </div>
              <div id="usernameCheck" class="username-check"></div>
            </div>
            <div class="form-group">
              <label>BIO</label>
              <textarea id="pfBioInput"
                placeholder="Tell something about yourself..."
                style="min-height:80px">${bio}</textarea>
            </div>

            <div style="background:rgba(200,119,64,0.07);
              border:1px solid var(--accent);border-radius:10px;
              padding:10px 12px;margin-bottom:14px;font-size:12px;
              color:var(--text2);display:flex;gap:8px;
              align-items:center">
              <i class="fas fa-camera"
                style="color:var(--accent);flex-shrink:0"></i>
              Tap your profile picture above to change it.
            </div>

            <button class="btn-primary" id="saveProfileBtn"
              onclick="saveProfile('${user.uid}')"
              style="width:100%">
              <i class="fas fa-floppy-disk"></i> Save Changes
            </button>
          </div>
        </div>

        <!-- WATCHLIST -->
        <div class="profile-section-title" style="margin-top:8px">
          <i class="fas fa-bookmark" style="color:var(--accent)"></i>
          My Watchlist
          <span style="font-size:12px;color:var(--text2);
            font-weight:400;margin-left:auto">${watchlist.length} saved</span>
        </div>
        <div id="watchlistGrid" class="grid" style="padding:0 16px">
          <div style="grid-column:1/-1;text-align:center;
            padding:30px;color:var(--text2)">
            <i class="fas fa-circle-notch fa-spin"></i>
          </div>
        </div>
      `;

      loadWatchlist(watchlist);
    }

    function toggleEdit() {
      const card = document.getElementById('editCard');
      const btn  = document.getElementById('editToggleBtn');
      if (card.classList.contains('hidden')) {
        card.classList.remove('hidden');
        btn.innerHTML = '<i class="fas fa-times" style="font-size:11px"></i> Close';
      } else {
        card.classList.add('hidden');
        btn.innerHTML = '<i class="fas fa-pen" style="font-size:11px"></i> Edit Profile';
      }
    }

    async function doLogout() {
      if(!confirm('Log out?')) return;
      await auth.signOut();
      window.location.href='index.html';
    }

    async function loadWatchlist(watchlist) {
      const grid=document.getElementById('watchlistGrid');
      if(!grid) return;
      if(!watchlist||!watchlist.length){
        grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;
          padding:40px;color:var(--text2)">
          <i class="fas fa-bookmark"
            style="font-size:36px;opacity:0.3;
              margin-bottom:14px;display:block"></i>
          Nothing saved yet.<br>
          <span style="font-size:12px">
            Tap ❤️ on any anime to save it here.
          </span>
        </div>`;
        return;
      }
      try {
        const list=[];
        for(let i=0;i<watchlist.length;i+=10){
          const batch=watchlist.slice(i,i+10);
          const snap=await db.collection('anime')
            .where(firebase.firestore.FieldPath.documentId(),'in',batch).get();
          snap.forEach(doc=>list.push({...doc.data(),firestoreId:doc.id}));
        }
        if(!list.length){
          grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;
            padding:30px;color:var(--text2)">No anime found.</div>`;
          return;
        }
        grid.innerHTML='';
        list.forEach(anime=>{
          const card=document.createElement('div');
          card.className='card'; card.style.cursor='pointer';
          card.innerHTML=`
            <div><img class="card-thumb" src="${anime.thumbnail||''}"
              alt="${anime.title}"
              onerror="this.style.background='var(--bg3)'"/></div>
            <div class="card-info">
              <span class="card-badge">
                ${(anime.type||'ANIME').toUpperCase()}
              </span>
              <div class="card-title">${anime.title}</div>
              <div class="card-meta">
                <span class="card-rating">
                  <i class="fas fa-star"></i> ${anime.rating||'N/A'}
                </span>
                <span class="card-year">${anime.year||''}</span>
              </div>
            </div>`;
          card.addEventListener('click',()=>{
            window.location.href=`anime.html?id=${anime.firestoreId}`;
          });
          grid.appendChild(card);
        });
      } catch(e){
        grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;
          padding:20px;color:var(--text2)">Could not load.</div>`;
      }
    }

    function showLogin() {
      document.getElementById('profilePage').innerHTML=`
        <div class="profile-login">
          <i class="fas fa-user-circle"></i>
          <h2>Not Logged In</h2>
          <p style="margin-bottom:24px">
            Please login to view your profile.
          </p>
          <button class="btn-primary"
            onclick="window.location.href='index.html'"
            style="margin:0 auto;max-width:200px;
              display:flex;align-items:center;gap:8px">
            <i class="fas fa-right-to-bracket"></i> Go to Login
          </button>
        </div>`;
    }

    loadTheme();
    auth.onAuthStateChanged(user=>{
      if(user) loadProfile(user);
      else showLogin();
    });
    document.getElementById('avatarOverlay').addEventListener('click',function(e){
      if(e.target===this) closeAvatarSheet();
    });
  </script>
</body>
</html>
